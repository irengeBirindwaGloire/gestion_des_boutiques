<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique</title>
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"
    />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <link
      rel="stylesheet"
      th:href="@{/webjars/font-awesome/6.7.2/css/all.css}"
    />
    <link
      rel="stylesheet"
      th:href="@{/webjars/font-awesome/6.7.2/css/fontawesome.css}"
    />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.min.js}"></script>
  </head>
  <body>
    <header class="bg-light">
      <nav class="nav-bar">
        <ul class="nav-items">
          <li class="items"><a th:href="@{/}">Dashboard</a></li>
          <li class="items"><a th:href="@{/store/}">Boutiques</a></li>
          <li class="items"><a th:href="@{/categorie/}">Categories</a></li>
          <li class="items"><a th:href="@{/product/}">Produits</a></li>
          <li class="items"><a th:href="@{/gestion/}">Gestion Produits</a></li>
        </ul>
      </nav>
    </header>
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center m-3">
        <div class="">
          <h5 class="text-muted mb-0"><i class="fas fa-store"></i> Boutique</h5>
          <p class="mb-0">Gestion des boutiques</p>
        </div>
        <a th:href="@{/store/new}" class="btn btn-dark">
          <i class="fa fa-plus-circle mr-2"></i> Nouvelle Boutique
        </a>
      </div>
      <hr />
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-striped">
            <thead class="bg-light">
              <th>#</th>
              <th>Designation</th>
              <th>Propriétaire</th>
              <th>Etat Boutique</th>
              <th>Tva</th>
              <th>Ville</th>
              <th>Code Postale</th>
              <th>Email</th>
              <th>Téléphone</th>
              <th>Actions</th>
            </thead>
            <tbody>
              <tr th:each="boutique : ${listeBoutique}">
                <td th:text="${boutique.id}"></td>
                <td th:text="${boutique.designation}"></td>
                <td th:text="${boutique.nomProprietaire}"></td>
                <td th:text="${boutique.etatBoutique}"></td>
                <td th:text="${boutique.configTva}"></td>
                <td th:text="${boutique.ville}"></td>
                <td th:text="${boutique.codePostal}"></td>
                <td th:text="${boutique.email}"></td>
                <td th:text="${boutique.telephone}"></td>
                <td>
                  <div class="bouton-group">
                    <a href="" class="btn btn-sm btn-primary">
                      <i class="fa fa-edit"></i>
                    </a>
                    <a href="" class="btn btn-sm btn-info">
                      <i class="fa fa-eye"></i>
                    </a>
                    <a href="" class="btn btn-sm btn-danger">
                      <i class="fa fa-trash"></i>
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
